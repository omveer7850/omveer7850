<svg width="100%" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5">
        <animate attributeName="stop-color"
          values="#4F46E5;#06B6D4;#8B5CF6;#4F46E5"
          dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#06B6D4">
        <animate attributeName="stop-color"
          values="#06B6D4;#8B5CF6;#4F46E5;#06B6D4"
          dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8B5CF6">
        <animate attributeName="stop-color"
          values="#8B5CF6;#4F46E5;#06B6D4;#8B5CF6"
          dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="900" height="200" fill="url(#bgGrad)"/>

  <text x="450" y="95" font-family="Segoe UI, Verdana, sans-serif" font-size="46"
        font-weight="700" fill="#F8FAFC" text-anchor="middle" opacity="0">
    Omveer Singh
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="0.2s" fill="freeze"/>
  </text>

  <text x="450" y="135" font-family="Segoe UI, Verdana, sans-serif" font-size="18"
        fill="#E2E8F0" text-anchor="middle" opacity="0">
    Full-Stack Developer · Java &amp; DSA
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="0.9s" fill="freeze"/>
  </text>
</svg>
